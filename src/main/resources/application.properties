spring.application.name=auth-service
#Eureka Connection
eureka.client.service-url.defaultZone=http://eureka:eureka123@localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
#Connectuin to Config Service
spring.config.import=configserver:http://localhost:8880
spring.cloud.config.discovery.enabled=true
spring.cloud.config.discovery.service-id=config-service
#Connection Resource
spring.cloud.config.username=config
spring.cloud.config.password=config123
spring.cloud.config.fail-fast=true
spring.profiles.active=dev
#Kafka for bus
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=auth-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
spring.kafka.consumer.auto-offset-reset=earliest